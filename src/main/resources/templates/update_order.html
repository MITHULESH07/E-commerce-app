<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Update Order - Order Management</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/orders}">&#128722; OrderManager</a>
    <ul class="navbar-nav">
        <li><a th:href="@{/orders}">View Orders</a></li>
        <li><a th:href="@{/orders/add}">+ Add Order</a></li>
    </ul>
</nav>

<div class="container">
    <h2 class="page-title" th:text="${pageTitle}">Update Order</h2>

    <div class="card" style="max-width: 560px;">
        <form th:action="@{/orders/edit/{id}(id=${order.orderId})}" th:object="${order}" method="post">

            <div class="form-group">
                <label>Order ID</label>
                <input type="text" class="form-control" th:value="'#' + ${order.orderId}" disabled/>
            </div>

            <div class="form-group">
                <label for="customerName">Customer Name</label>
                <input type="text" id="customerName" th:field="*{customerName}"
                       class="form-control" th:classappend="${#fields.hasErrors('customerName')} ? 'is-invalid'"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('customerName')}"
                     th:errors="*{customerName}"></div>
            </div>

            <div class="form-group">
                <label for="productName">Product Name</label>
                <input type="text" id="productName" th:field="*{productName}"
                       class="form-control" th:classappend="${#fields.hasErrors('productName')} ? 'is-invalid'"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('productName')}"
                     th:errors="*{productName}"></div>
            </div>

            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" th:field="*{quantity}"
                       class="form-control" th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'"
                       min="1"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('quantity')}"
                     th:errors="*{quantity}"></div>
            </div>

            <div class="form-group">
                <label for="price">Price (&#8377;)</label>
                <input type="number" id="price" th:field="*{price}"
                       class="form-control" th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                       step="0.01" min="0.01"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}"
                     th:errors="*{price}"></div>
            </div>

            <div style="display: flex; gap: 0.7rem; margin-top: 1.5rem;">
                <button type="submit" class="btn btn-primary">Update Order</button>
                <a th:href="@{/orders}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
