<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Error - Order Management</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" th:href="@{/orders}">&#128722; OrderManager</a>
</nav>
<div class="container">
    <div class="empty-state" style="margin-top: 3rem;">
        <div class="empty-icon">&#9888;</div>
        <h2 style="margin-bottom:0.5rem;">Something went wrong</h2>
        <p th:text="${error ?: 'An unexpected error occurred.'}"></p>
        <a th:href="@{/orders}" class="btn btn-primary" style="margin-top: 1rem;">Back to Orders</a>
    </div>
</div>
</body>
</html>
