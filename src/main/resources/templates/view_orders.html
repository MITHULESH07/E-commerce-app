<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>All Orders - Order Management</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a class="navbar-brand" th:href="@{/orders}">&#128722; OrderManager</a>
    <ul class="navbar-nav">
        <li><a th:href="@{/orders}">View Orders</a></li>
        <li><a th:href="@{/orders/add}">+ Add Order</a></li>
    </ul>
</nav>

<div class="container">

    <!-- Flash Messages -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}"   class="alert alert-danger"  th:text="${errorMessage}"></div>

    <!-- Stats Row -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total Orders</div>
            <div class="stat-value" th:text="${orders.size()}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Revenue</div>
            <div class="stat-value"
                 th:text="'&#8377;' + ${#aggregates.sum(orders.![price * quantity])}">&#8377;0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Unique Products</div>
            <div class="stat-value"
                 th:text="${#lists.size(orders.![#strings.toLowerCase(#strings.trim(productName))].stream().distinct().toList())}">0</div>
        </div>
    </div>

    <h2 class="page-title" th:text="${pageTitle}">All Orders</h2>

    <!-- Search Bar -->
    <form th:action="@{/orders}" method="get" class="search-bar">
        <input type="text" name="search" placeholder="Search by customer or product name..."
               th:value="${searchKeyword}"/>
        <button type="submit" class="btn btn-primary">Search</button>
        <a th:href="@{/orders}" class="btn btn-secondary">Clear</a>
        <a th:href="@{/orders/add}" class="btn btn-success">+ Add Order</a>
    </form>

    <!-- Search Result Message -->
    <div th:if="${searchMessage}" class="alert alert-success" th:text="${searchMessage}"></div>

    <!-- Orders Table -->
    <div class="card" style="padding: 0;">
        <div class="table-wrapper">
            <table th:if="${!orders.isEmpty()}">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Order ID</th>
                        <th>Customer Name</th>
                        <th>Product Name</th>
                        <th>Quantity</th>
                        <th>Price (&#8377;)</th>
                        <th>Total (&#8377;)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order, stat : ${orders}">
                        <td th:text="${stat.index + 1}">1</td>
                        <td><span class="badge badge-order" th:text="'#' + ${order.orderId}">1</span></td>
                        <td th:text="${order.customerName}">Customer</td>
                        <td th:text="${order.productName}">Product</td>
                        <td th:text="${order.quantity}">1</td>
                        <td th:text="${#numbers.formatDecimal(order.price, 1, 2)}">0.00</td>
                        <td th:text="${#numbers.formatDecimal(order.totalValue, 1, 2)}">0.00</td>
                        <td>
                            <div class="action-btns">
                                <a th:href="@{/orders/edit/{id}(id=${order.orderId})}"
                                   class="btn btn-warning btn-sm">Edit</a>
                                <a th:href="@{/orders/delete/{id}(id=${order.orderId})}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('Delete this order?')">Delete</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- Empty State -->
            <div th:if="${orders.isEmpty()}" class="empty-state">
                <div class="empty-icon">&#128230;</div>
                <p>No orders found.</p>
                <a th:href="@{/orders/add}" class="btn btn-primary">Add Your First Order</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
